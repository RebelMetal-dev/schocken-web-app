<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schocken — Digital Tavern</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <!--
        HTMX: enables partial page swaps and server-sent event triggers.
        No JavaScript framework required — HTMX intercepts form submissions and
        replaces only the targeted DOM element with the server's HTML response.
    -->
    <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body  { background-color: #121212; color: #e0e0e0; }
        .card { background-color: #1e1e1e; border: 1px solid #333; }
    </style>
</head>
<body class="p-4">

<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-warning mb-0">The Schocken Tavern</h1>
        <div class="d-flex align-items-center gap-3">
            <span id="ws-indicator" class="small text-muted">⚪ Connecting...</span>
            <a href="/" class="btn btn-outline-warning btn-sm">New Session</a>
        </div>
    </div>

    <!--
        Error Target: HTMX swaps the error-alert fragment into this zone
        when GlobalExceptionHandler detects an HX-Request and returns a
        ModelAndView instead of JSON. Kept above the main row so errors
        are always visible regardless of which fragment triggered them.
        Empty on initial load — only populated on error.
    -->
    <div id="error-target" class="mb-3"></div>

    <div class="row g-4">
        <!--
            Tavern Table (col-md-8):
            Included via th:replace on initial load.
            After that, HTMX roll buttons swap this region directly using id="tavern-table".
        -->
        <div class="col-md-8">
            <div th:replace="~{fragments/tavern-table :: tavern-table}"></div>
        </div>

        <!--
            Player Sidebar (col-md-4):
            Included via th:replace on initial load.
            After that, the fragment self-refreshes on the "diceRolled" HTMX event
            (hx-trigger is declared on the fragment root, so it survives every swap).
        -->
        <div class="col-md-4">
            <div th:replace="~{fragments/player-sidebar :: player-sidebar}"></div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const indicator = document.getElementById('ws-indicator');

        // Session ID is injected by Thymeleaf into the tavern-table root element.
        // We re-read it on every message since HTMX may have swapped the element.
        function getSessionId() {
            const el = document.getElementById('tavern-table');
            return el ? el.dataset.sessionId : null;
        }

        const sessionId = getSessionId();
        if (!sessionId) {
            indicator.textContent = '⚪ No session';
            return;
        }

        const socket = new SockJS('/ws');
        const stomp  = Stomp.over(socket);
        stomp.debug  = null; // suppress console noise

        stomp.connect({}, function () {
            indicator.textContent = '🟢 Live';

            stomp.subscribe('/topic/sessions/' + sessionId + '/state', function (msg) {
                const state = JSON.parse(msg.body);

                // Update Phase and Central Stack directly — no full-page reload needed.
                const phaseEl = document.querySelector('[data-ws="phase"]');
                const stackEl = document.querySelector('[data-ws="stack"]');
                if (phaseEl) phaseEl.textContent = state.phase;
                if (stackEl) stackEl.textContent = state.centralStack + ' Chips';

                // Flash the indicator to show the update landed
                indicator.textContent = '⚡ Updated';
                setTimeout(() => { indicator.textContent = '🟢 Live'; }, 800);
            });

        }, function () {
            indicator.textContent = '🔴 Disconnected';
        });
    });
</script>
</body>
</html>
